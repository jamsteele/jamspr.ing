<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancouver Bingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <header class="home-header">
                <h1 class="logo">Vancouver<br><span>Bingo</span></h1>
                <p class="tagline">How well do you know your city?</p>
            </header>
            <div class="card-grid" id="card-grid">
                <!-- Cards injected by JS -->
            </div>
        </div>

        <!-- Bingo Board Screen -->
        <div id="board-screen" class="screen">
            <header class="board-header">
                <button class="back-btn" id="back-btn">&larr;</button>
                <div class="board-title-wrap">
                    <h2 class="board-title" id="board-title"></h2>
                    <p class="board-subtitle" id="board-subtitle"></p>
                </div>
                <button class="share-btn" id="share-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                </button>
            </header>

            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-info">
                <span class="progress-text" id="progress-text">0 / 25</span>
                <span class="progress-title" id="progress-title">Tourist</span>
            </div>

            <div class="board-zoom-toggle">
                <button class="new-card-btn" id="new-card-btn">🎲 New Card</button>
                <button class="zoom-btn" id="zoom-btn" title="Toggle zoom">
                    <svg id="zoom-icon-in" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                    <svg id="zoom-icon-out" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                    <span id="zoom-label">Zoom In</span>
                </button>
            </div>

            <div class="board-scroll-container" id="board-scroll-container">
                <div class="bingo-board" id="bingo-board">
                    <!-- 5x5 grid injected by JS -->
                </div>
            </div>

            <div class="bingo-lines" id="bingo-lines"></div>
        </div>
    </div>

    <!-- New Card Confirm Dialog -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-dialog">
            <p class="confirm-text">Deal a new card?</p>
            <p class="confirm-subtext">Your current progress will be lost.</p>
            <div class="confirm-buttons">
                <button class="confirm-cancel" id="confirm-cancel">Keep Playing</button>
                <button class="confirm-ok" id="confirm-ok">New Card 🎲</button>
            </div>
        </div>
    </div>

    <!-- Cell Detail Popup -->
    <div class="cell-popup-overlay" id="cell-popup-overlay">
        <div class="cell-popup" id="cell-popup">
            <button class="cell-popup-close" id="cell-popup-close">&times;</button>
            <div class="cell-popup-text" id="cell-popup-text"></div>
            <input class="cell-popup-note" id="cell-popup-note" type="text" maxlength="60" />
            <div class="cell-popup-buttons">
                <button class="cell-popup-action" id="cell-popup-action">Mark Complete</button>
                <button class="cell-popup-swap" id="cell-popup-swap">↻ Swap Square</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Bingo share nudge -->
    <div class="bingo-nudge" id="bingo-nudge">
        <span class="bingo-nudge-text">Want to share your bingo? 🎉</span>
        <button class="bingo-nudge-share" id="bingo-nudge-share">Share</button>
        <button class="bingo-nudge-dismiss" id="bingo-nudge-dismiss">&times;</button>
    </div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Share overlay -->
    <div class="share-overlay" id="share-overlay">
        <div class="share-modal">
            <button class="share-close" id="share-close">&times;</button>
            <div class="share-toggle">
                <button class="share-tab active" data-mode="progress">My Progress</button>
                <button class="share-tab" data-mode="clean">Clean Card</button>
            </div>
            <canvas id="share-canvas"></canvas>
            <button class="share-download" id="share-download">Share Image</button>
        </div>
    </div>

    <script data-goatcounter="https://jamspr-ing.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <script src="cards.js"></script>
    <script src="app.js"></script>
</body>
</html>
